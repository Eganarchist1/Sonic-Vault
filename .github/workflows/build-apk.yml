name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (Generate Native Android Folder)
        run: npx expo prebuild --platform android --clean

      - name: Build Release APK
        working-directory: ./android
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        # This standard gradle command compiles the release APK for 64-bit ARM only
        run: ./gradlew assembleRelease --stacktrace -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK to transfer.sh (Bypass GitHub Quota)
        working-directory: ./android
        run: |
          echo "Uploading APK to transfer.sh..."
          URL=$(curl -H "Max-Days: 7" --upload-file ./app/build/outputs/apk/release/app-release.apk https://transfer.sh/resonance-release.apk)
          echo "=========================================="
          echo "DOWNLOAD YOUR APK HERE: $URL"
          echo "=========================================="
